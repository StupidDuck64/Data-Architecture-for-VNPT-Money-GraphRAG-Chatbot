version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  VNPT Money Data Pipeline – Docker Compose
#  Services:
#    neo4j           – Graph database (port 7474 / 7687)
#    minio           – S3-compatible data lake (port 9000 / 9001 console)
#    minio-init      – Creates initial bucket
#    redis           – Airflow broker + result backend + session cache
#    postgres        – Airflow metadata DB
#    airflow-init    – One-shot DB migration + admin user creation
#    airflow-webserver
#    airflow-scheduler
#    pipeline        – Stand-alone one-shot pipeline runner
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR:                  CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL:              redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND:          db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY:                ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES:             "false"
    AIRFLOW__WEBSERVER__SECRET_KEY:           ${AIRFLOW_SECRET_KEY}
    PYTHONPATH:                               /opt/airflow
    # Pipeline env vars forwarded
    NEO4J_URI:       ${NEO4J_URI:-bolt://neo4j:7687}
    NEO4J_USER:      ${NEO4J_USER:-neo4j}
    NEO4J_PASSWORD:  ${NEO4J_PASSWORD}
    MINIO_ENDPOINT:  ${MINIO_ENDPOINT:-minio:9000}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET:    ${MINIO_BUCKET:-vnpt-datalake}
    OPENAI_API_KEY:  ${OPENAI_API_KEY:-}
  volumes:
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped


services:
  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: vnpt_neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH:                         neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS:                      '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4jpassword}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: vnpt_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: vnpt_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET:-vnpt-datalake};
        mc ilm add local/${MINIO_BUCKET:-vnpt-datalake} --prefix 'raw/'   --expiry-days 90;
        mc ilm add local/${MINIO_BUCKET:-vnpt-datalake} --prefix 'clean/' --expiry-days 365;
        echo 'MinIO bucket and lifecycle policy ready';
      "
    restart: "no"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vnpt_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL (Airflow metadata) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vnpt_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB:       ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Airflow Init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: vnpt_airflow_init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER:-admin}
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com || true
      "
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: vnpt_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: vnpt_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Worker ────────────────────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    container_name: vnpt_airflow_worker
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Stand-alone pipeline runner ───────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: vnpt_pipeline
    env_file: .env
    environment:
      NEO4J_URI:        bolt://neo4j:7687
      NEO4J_USER:       neo4j
      NEO4J_PASSWORD:   ${NEO4J_PASSWORD:-neo4jpassword}
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET:     ${MINIO_BUCKET:-vnpt-datalake}
      OPENAI_API_KEY:   ${OPENAI_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["python", "pipeline/run_pipeline.py"]
    profiles:
      - oneshot   # Only starts when --profile oneshot is given

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  minio_data:
  postgres_data:
